name: Kripto Bot Saatlik

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - name: Bot Calistir
        run: |
          APP_URL="${{ secrets.VERCEL_APP_URL }}"
          SECRET="${{ secrets.BOT_SECRET }}"
          if [ -z "$APP_URL" ]; then
            echo "HATA: VERCEL_APP_URL secret eksik"
            exit 1
          fi
          echo "Bot tetikleniyor..."
          curl -f -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-bot-secret: $SECRET" \
            --max-time 58 \
            -d "{}" \
            "$APP_URL/api/kripto-bot" \
            -o /tmp/resp.json \
            -w "HTTP: %{http_code}\n"
          echo "Yanit:"
          cat /tmp/resp.json
